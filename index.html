<style>
body{

    height:100vh;

}

/* BACKGROUND IMAGE LAYER */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:url("https://i.pinimg.com/1200x/0d/5c/ff/0d5cff92c8466551853f9864baba4c14.jpg");

body::after{
